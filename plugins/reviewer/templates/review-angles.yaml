# Review angle definitions for parallel multi-angle review.
# Used by spec-orchestrator and result-fix-orchestrator agents.
# Each angle constrains the reviewer to a specific focus area, improving
# single-round coverage when run in parallel.
#
# Boundary enforcement: the orchestrator's per-angle sub-agent prompt already
# instructs "Review the spec ONLY through your assigned angle" — each `focus:`
# below describes WHAT this angle covers, not what it excludes. Do not add
# per-angle "Do NOT review X" lines; rely on the orchestrator's single
# instruction as the source of truth.
#
# Angle IDs map to reviewer focus areas:
#   spec angles  → scope, completeness, tasks, platform, design, consistency, composition
#   result angles → coverage, robustness, correctness

spec:
  scope:
    label: "Scope & Boundaries"
    focus: |
      Scope and intent clarity.
      Review for: problem statement clarity, measurable goals, non-goals section,
      scope boundaries (in vs out), target user identification, ambiguous
      boundaries, and a risks list where each risk names its blast radius and a
      mitigation (or explicit acceptance).

  completeness:
    label: "Completeness & Edge Cases"
    focus: |
      Spec completeness and missing elements.
      Review for: missing edge cases, error handling gaps, input validation
      rules, security considerations, observability (logging/metrics/alerts),
      state transitions and triggers, and performance constraints.

  tasks:
    label: "Task Coverage & Done Criteria"
    focus: |
      Task readiness and coverage.
      Review for: every spec requirement mapping to at least one task, clear
      and verifiable done criteria, every acceptance criterion mapping to an
      executable verification (named test, CLI invocation, or manual assertion
      with expected output), tasks for error/edge cases (not just happy path),
      test tasks, dependency ordering, and independent completability.
      For changes with more than 10 tasks, verify checkpoint tasks exist after
      each milestone (a task that runs a partial-diff result review and gates
      on CRITICAL findings before continuing).

  platform:
    label: "Platform & Tool Feasibility"
    focus: |
      Platform, runtime, and third-party tool assumptions.
      Review for: OS/architecture/runtime dependencies, cloud region or service
      limitations, tool capability disclaimers ("Linux-only", "requires root"),
      unverified platform assumptions, and missing pre-implementation validation
      options (act, docker dry-run, sandbox flags).
      Always suggest the cheapest possible runtime dry-run for any platform/tool
      integration (CI, cloud, runtime, container).

  design:
    label: "Design Soundness"
    focus: |
      Whether the design holds up architecturally.
      Review for: design-to-proposal alignment (does the design actually solve
      the stated problem?), risky or unverified assumptions, unclear coupling
      between modules/services, error propagation and recovery strategy, state
      ownership and concurrency model, idempotency / retry semantics, API
      surface coherence, and rollout/rollback strategy for runtime-affecting
      changes (how it ships, how it reverts, what triggers a rollback).
      Flag missing or hand-wavy "how it works" sections.

  consistency:
    label: "Internal Consistency"
    focus: |
      Whether the spec set contradicts itself across documents and milestone
      boundaries.

      Build a mental matrix per acceptance criterion:
      `| acceptance # | delivered-by task | deferred-by statement |`.
      Any row where columns 2 AND 3 are both non-empty is a contradiction.

      Check:
      - Acceptance criteria vs deferral statements across proposal, design,
        tasks, and any code docstrings referenced in the spec (e.g. "see `path`")
      - Every acceptance criterion has a corresponding task within its stated
        milestone
      - Every deferred item names a target milestone, and that milestone's
        scope description includes it
      - Read docstrings of any source file referenced via "see `<path>`" or
        that tasks.md will modify — those constrain spec scope and must agree
        with acceptance criteria

      Category for all issues is `consistency`. Default severity is MEDIUM or
      higher.

      ## PASS sign-off gate
      Before emitting PASS, assert both as one-line bullets in your Verdict:
      - "No acceptance criterion is contradicted by any deferral statement elsewhere in the spec set."
      - "Every acceptance criterion is delivered by a task within its stated milestone."
      If you cannot assert either, the verdict is FAIL regardless of issue count.

  composition:
    label: "Cross-Cutting Composition"
    focus: |
      Contradictions between multiple spec units that will be implemented
      together. For each unit, extract platform/runtime/tool assumptions
      (MUST/SHALL/"requires"/"uses" statements). Flag any assumption in one
      unit that breaks another unit at runtime. Category for all issues is
      `cross-cutting`, severity defaults to CRITICAL.
      The orchestrator decides whether to activate this angle based on whether
      the review scope contains multiple independent spec units.

result:
  coverage:
    label: "Spec Coverage"
    focus: |
      Whether each spec requirement has a corresponding implementation.
      For each requirement in the spec, check if it appears in the diff.
      Flag requirements that are NOT FOUND in the diff.
      If the spec set's tasks include checkpoint tasks (mid-implementation
      partial-diff reviews), verify each is checked off; flag any unchecked
      checkpoint task as a finding — the implementation skipped its gate.

  robustness:
    label: "Robustness & Security"
    focus: |
      Error handling, validation, and security in the implementation.
      Review for: missing error handling, input validation gaps, security
      vulnerabilities, edge case handling, missing try/catch blocks,
      unvalidated user input, and authentication/authorization gaps.

  correctness:
    label: "Correctness & Logic"
    focus: |
      Whether the implementation logic matches the spec intent.
      Review for: algorithm correctness, data flow accuracy, state management,
      off-by-one errors, race conditions, incorrect assumptions, and divergence
      between spec intent and actual behavior.
